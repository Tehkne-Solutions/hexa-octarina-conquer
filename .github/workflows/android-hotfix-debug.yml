name: Android Hotfix Debug

on:
  push:
    branches: ["agent/hotfix-0.11.1-android-install"]
  pull_request:
    branches: [main]

concurrency:
  group: android-hotfix-debug-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-existing-apks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: actions/download-artifact@v4
        with:
          name: hexa-octarina-android-0.11.1
          path: build/android
          repository: Tehkne-Solutions/hexa-octarina-conquer
          run-id: 29656381732
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Android build tools
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" --sdk_root="$ANDROID_HOME" "build-tools;35.0.1"
      - name: Recreate stable development key
        run: |
          mkdir -p .ci
          curl -fsSL 'https://android.googlesource.com/platform/build/+/refs/heads/main/target/product/security/testkey.pk8?format=TEXT' | base64 --decode > .ci/aosp-testkey.pk8
          curl -fsSL 'https://android.googlesource.com/platform/build/+/refs/heads/main/target/product/security/testkey.x509.pem?format=TEXT' | base64 --decode > .ci/aosp-testkey.x509.pem
          openssl pkcs8 -inform DER -nocrypt -in .ci/aosp-testkey.pk8 -out .ci/aosp-testkey.pem
          openssl pkcs12 -export -in .ci/aosp-testkey.x509.pem -inkey .ci/aosp-testkey.pem -name tehkne-debug -out .ci/tehkne-debug.p12 -passout pass:android
          keytool -importkeystore -noprompt -srckeystore .ci/tehkne-debug.p12 -srcstoretype PKCS12 -srcstorepass android -srcalias tehkne-debug -destkeystore .ci/tehkne-debug.keystore -deststoretype PKCS12 -deststorepass android -destkeypass android -destalias tehkne-debug
      - name: Run APK validators without truncating diagnostics
        run: |
          set +e
          BUILD_TOOLS="$ANDROID_HOME/build-tools/35.0.1"
          python scripts/validate-android-apk.py \
            build/android/HexaOctarinaConquer-v0.11.1-universal.apk \
            --aapt2 "$BUILD_TOOLS/aapt2" \
            --apksigner "$BUILD_TOOLS/apksigner" \
            --zipalign "$BUILD_TOOLS/zipalign" \
            --keystore .ci/tehkne-debug.keystore \
            --key-alias tehkne-debug \
            --abis armeabi-v7a,arm64-v8a \
            > build/android/universal-validator.log 2>&1
          echo $? > build/android/universal-validator.status
          python scripts/validate-android-apk.py \
            build/android/HexaOctarinaConquer-v0.11.1-ci-x86_64.apk \
            --aapt2 "$BUILD_TOOLS/aapt2" \
            --apksigner "$BUILD_TOOLS/apksigner" \
            --zipalign "$BUILD_TOOLS/zipalign" \
            --keystore .ci/tehkne-debug.keystore \
            --key-alias tehkne-debug \
            --abis x86_64 \
            > build/android/x86-validator.log 2>&1
          echo $? > build/android/x86-validator.status
          exit 0
      - name: Show concise APK validator results
        run: |
          echo "universal_status=$(cat build/android/universal-validator.status)"
          tail -n 30 build/android/universal-validator.log
          echo "x86_status=$(cat build/android/x86-validator.status)"
          tail -n 30 build/android/x86-validator.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-validator-diagnostic
          path: |
            build/android/*validator.log
            build/android/*validator.status
          if-no-files-found: error
      - name: Require APK validation success
        run: |
          test "$(cat build/android/universal-validator.status)" = "0"
          test "$(cat build/android/x86-validator.status)" = "0"
      - uses: actions/upload-artifact@v4
        with:
          name: android-hotfix-validated-apks
          path: build/android/*.apk
          if-no-files-found: error

  install-existing-apk:
    needs: validate-existing-apks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: android-hotfix-validated-apks
          path: build/android
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Exercise APK on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel_2
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            set +e
            REPORT="$GITHUB_WORKSPACE/build/android/emulator-report.txt"
            : > "$REPORT"
            APK="$GITHUB_WORKSPACE/build/android/HexaOctarinaConquer-v0.11.1-ci-x86_64.apk"

            record() {
              local name="$1"
              local status="$2"
              echo "$name=$status" | tee -a "$REPORT"
            }

            adb uninstall com.tehkne.hexaoctarina >/dev/null 2>&1 || true
            adb install "$APK" > "$GITHUB_WORKSPACE/build/android/adb-install.log" 2>&1
            install_status=$?
            grep -q 'Success' "$GITHUB_WORKSPACE/build/android/adb-install.log"
            install_success=$?
            if [ "$install_status" -eq 0 ] && [ "$install_success" -eq 0 ]; then record install PASS; else record install FAIL; fi

            adb shell pm path com.tehkne.hexaoctarina > "$GITHUB_WORKSPACE/build/android/package-path.log" 2>&1
            if grep -q '^package:' "$GITHUB_WORKSPACE/build/android/package-path.log"; then record package_path PASS; else record package_path FAIL; fi

            adb install -r "$APK" > "$GITHUB_WORKSPACE/build/android/adb-update.log" 2>&1
            update_status=$?
            grep -q 'Success' "$GITHUB_WORKSPACE/build/android/adb-update.log"
            update_success=$?
            if [ "$update_status" -eq 0 ] && [ "$update_success" -eq 0 ]; then record update PASS; else record update FAIL; fi

            adb shell cmd package resolve-activity --brief \
              -a android.intent.action.MAIN \
              -c android.intent.category.LAUNCHER \
              com.tehkne.hexaoctarina \
              > "$GITHUB_WORKSPACE/build/android/activity-resolve.log" 2>&1
            ACTIVITY="$(tr -d '\r' < "$GITHUB_WORKSPACE/build/android/activity-resolve.log" | tail -n 1)"
            if echo "$ACTIVITY" | grep -q 'com.tehkne.hexaoctarina'; then record activity_resolve PASS; else record activity_resolve FAIL; fi

            if [ -n "$ACTIVITY" ]; then
              adb shell am start -W -n "$ACTIVITY" > "$GITHUB_WORKSPACE/build/android/activity-start.log" 2>&1
              start_status=$?
            else
              start_status=1
              echo 'activity not resolved' > "$GITHUB_WORKSPACE/build/android/activity-start.log"
            fi
            if [ "$start_status" -eq 0 ]; then record activity_start PASS; else record activity_start FAIL; fi

            adb shell dumpsys package com.tehkne.hexaoctarina > "$GITHUB_WORKSPACE/build/android/package-dump.log" 2>&1
            if grep -q 'versionCode=12' "$GITHUB_WORKSPACE/build/android/package-dump.log"; then record version_code PASS; else record version_code FAIL; fi
            if grep -q 'versionName=0.11.1' "$GITHUB_WORKSPACE/build/android/package-dump.log"; then record version_name PASS; else record version_name FAIL; fi

            adb uninstall com.tehkne.hexaoctarina > "$GITHUB_WORKSPACE/build/android/adb-uninstall.log" 2>&1
            if grep -q 'Success' "$GITHUB_WORKSPACE/build/android/adb-uninstall.log"; then record uninstall PASS; else record uninstall FAIL; fi
            exit 0
      - name: Show emulator diagnostic
        if: always()
        run: |
          cat build/android/emulator-report.txt
          for log in build/android/adb-install.log build/android/package-path.log build/android/adb-update.log build/android/activity-resolve.log build/android/activity-start.log build/android/package-dump.log build/android/adb-uninstall.log; do
            echo "===== $log ====="
            cat "$log" || true
          done
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-emulator-diagnostic
          path: |
            build/android/*.log
            build/android/emulator-report.txt
          if-no-files-found: warn
      - name: Require installation and update success
        run: |
          for check in install package_path update activity_resolve activity_start version_code version_name uninstall; do
            grep -q "^${check}=PASS$" build/android/emulator-report.txt
          done
