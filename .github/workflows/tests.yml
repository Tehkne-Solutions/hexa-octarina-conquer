name: Core Tests

on:
  push:
    branches: [main, "agent/**"]
  pull_request:
    branches: [main]

concurrency:
  group: core-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-reference-engine:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e .
      - name: Compile sources
        run: python -m compileall -q src tests conformance scripts
      - name: Run unit and Godot package tests
        run: python -m unittest discover -s tests -v

  godot-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Install Android SDK 35 packages
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          test -x "$SDKMANAGER"
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" --sdk_root="$ANDROID_HOME" \
            "platform-tools" \
            "build-tools;35.0.1" \
            "platforms;android-35" \
            "cmake;3.10.2.4988404" \
            "ndk;28.1.13356709"
      - name: Download official Godot 4.6.3 and export templates
        run: |
          curl -fsSL -o godot.zip https://github.com/godotengine/godot-builds/releases/download/4.6.3-stable/Godot_v4.6.3-stable_linux.x86_64.zip
          unzip -q godot.zip
          chmod +x Godot_v4.6.3-stable_linux.x86_64
          curl -fsSL -o templates.tpz https://github.com/godotengine/godot-builds/releases/download/4.6.3-stable/Godot_v4.6.3-stable_export_templates.tpz
          rm -rf template-unpack
          mkdir -p template-unpack "$HOME/.local/share/godot/export_templates/4.6.3.stable"
          unzip -q templates.tpz -d template-unpack
          cp -R template-unpack/templates/. "$HOME/.local/share/godot/export_templates/4.6.3.stable/"
      - name: Create stable Tehkné development keystore
        run: |
          mkdir -p "$HOME/.config/godot" "$HOME/.android" .ci
          curl -fsSL 'https://android.googlesource.com/platform/build/+/refs/heads/main/target/product/security/testkey.pk8?format=TEXT' \
            | base64 --decode > .ci/aosp-testkey.pk8
          curl -fsSL 'https://android.googlesource.com/platform/build/+/refs/heads/main/target/product/security/testkey.x509.pem?format=TEXT' \
            | base64 --decode > .ci/aosp-testkey.x509.pem
          openssl pkcs8 -inform DER -nocrypt -in .ci/aosp-testkey.pk8 -out .ci/aosp-testkey.pem
          openssl pkcs12 -export \
            -in .ci/aosp-testkey.x509.pem \
            -inkey .ci/aosp-testkey.pem \
            -name tehkne-debug \
            -out .ci/tehkne-debug.p12 \
            -passout pass:android
          keytool -importkeystore -noprompt \
            -srckeystore .ci/tehkne-debug.p12 \
            -srcstoretype PKCS12 \
            -srcstorepass android \
            -srcalias tehkne-debug \
            -destkeystore "$HOME/.android/tehkne-debug.keystore" \
            -deststoretype PKCS12 \
            -deststorepass android \
            -destkeypass android \
            -destalias tehkne-debug
          keytool -list -v \
            -keystore "$HOME/.android/tehkne-debug.keystore" \
            -storepass android \
            -alias tehkne-debug
          printf '%s\n' \
            '[gd_resource type="EditorSettings" format=3]' \
            '[resource]' \
            "export/android/android_sdk_path = \"$ANDROID_HOME\"" \
            "export/android/java_sdk_path = \"$JAVA_HOME\"" \
            "export/android/debug_keystore = \"$HOME/.android/tehkne-debug.keystore\"" \
            'export/android/debug_keystore_user = "tehkne-debug"' \
            'export/android/debug_keystore_pass = "android"' \
            > "$HOME/.config/godot/editor_settings-4.6.tres"
      - name: Install Godot Android Gradle template
        run: |
          ANDROID_SOURCE="$HOME/.local/share/godot/export_templates/4.6.3.stable/android_source.zip"
          test -f "$ANDROID_SOURCE"
          rm -rf client/godot/android
          mkdir -p client/godot/android/build
          unzip -q "$ANDROID_SOURCE" -d client/godot/android/build
          printf '4.6.3.stable\n' > client/godot/android/.build_version
          : > client/godot/android/build/.gdignore
          test -f client/godot/android/build/build.gradle
          test -f client/godot/android/build/gradlew
          test "$(cat client/godot/android/.build_version)" = "4.6.3.stable"
          chmod +x client/godot/android/build/gradlew
      - name: Import and parse Godot project
        run: ./Godot_v4.6.3-stable_linux.x86_64 --headless --path client/godot --editor --quit-after 2
      - name: Export universal and emulator APKs
        env:
          GODOT_ANDROID_KEYSTORE_DEBUG_PATH: ${{ github.workspace }}/.ci/tehkne-debug.keystore
          GODOT_ANDROID_KEYSTORE_DEBUG_USER: tehkne-debug
          GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD: android
        run: |
          mkdir -p build/android .ci
          cp "$HOME/.android/tehkne-debug.keystore" .ci/tehkne-debug.keystore
          set +e
          ./Godot_v4.6.3-stable_linux.x86_64 --verbose --headless \
            --path client/godot \
            --export-debug Android \
            "$PWD/build/android/HexaOctarinaConquer-v0.11.1-universal.apk" \
            2>&1 | tee build/android/godot-export-universal.log
          universal_status=${PIPESTATUS[0]}
          ./Godot_v4.6.3-stable_linux.x86_64 --verbose --headless \
            --path client/godot \
            --export-debug "Android CI x86_64" \
            "$PWD/build/android/HexaOctarinaConquer-v0.11.1-ci-x86_64.apk" \
            2>&1 | tee build/android/godot-export-x86_64.log
          x86_status=${PIPESTATUS[0]}
          set -e
          if [ "$universal_status" -ne 0 ] || [ "$x86_status" -ne 0 ]; then
            echo "::error title=Godot Android export failed::universal=$universal_status x86_64=$x86_status"
            exit 1
          fi
          test -s build/android/HexaOctarinaConquer-v0.11.1-universal.apk
          test -s build/android/HexaOctarinaConquer-v0.11.1-ci-x86_64.apk
      - name: Validate APK installability metadata
        run: |
          BUILD_TOOLS="$ANDROID_HOME/build-tools/35.0.1"
          python scripts/validate-android-apk.py \
            build/android/HexaOctarinaConquer-v0.11.1-universal.apk \
            --aapt2 "$BUILD_TOOLS/aapt2" \
            --apksigner "$BUILD_TOOLS/apksigner" \
            --zipalign "$BUILD_TOOLS/zipalign" \
            --keystore .ci/tehkne-debug.keystore \
            --key-alias tehkne-debug \
            --abis armeabi-v7a,arm64-v8a \
            | tee build/android/apk-validation-universal.log
          python scripts/validate-android-apk.py \
            build/android/HexaOctarinaConquer-v0.11.1-ci-x86_64.apk \
            --aapt2 "$BUILD_TOOLS/aapt2" \
            --apksigner "$BUILD_TOOLS/apksigner" \
            --zipalign "$BUILD_TOOLS/zipalign" \
            --keystore .ci/tehkne-debug.keystore \
            --key-alias tehkne-debug \
            --abis x86_64 \
            | tee build/android/apk-validation-x86_64.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hexa-octarina-android-0.11.1
          path: |
            build/android/HexaOctarinaConquer-v0.11.1-universal.apk
            build/android/HexaOctarinaConquer-v0.11.1-ci-x86_64.apk
            build/android/godot-export-universal.log
            build/android/godot-export-x86_64.log
            build/android/apk-validation-universal.log
            build/android/apk-validation-x86_64.log
          if-no-files-found: error

  android-install-smoke:
    needs: godot-client
    runs-on: ubuntu-latest
    env:
      ANDROID_AVD_HOME: ${{ runner.temp }}/android-avd
      ANDROID_SDK_HOME: ${{ runner.temp }}/android-sdk-home
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: hexa-octarina-android-0.11.1
          path: build/android
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm
      - name: Install Android emulator image
        run: |
          mkdir -p "$ANDROID_AVD_HOME" "$ANDROID_SDK_HOME"
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          AVDMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/avdmanager"
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" --sdk_root="$ANDROID_HOME" \
            "platform-tools" \
            "emulator" \
            "system-images;android-29;default;x86_64"
          echo no | "$AVDMANAGER" create avd \
            --force \
            --name hexa-ci \
            --package "system-images;android-29;default;x86_64" \
            --device "pixel_2"
          find "$ANDROID_AVD_HOME" -maxdepth 2 -type f -print
          test -f "$ANDROID_AVD_HOME/hexa-ci.ini"
      - name: Boot Android emulator
        run: |
          mkdir -p build/android
          "$ANDROID_HOME/emulator/emulator" -list-avds | tee build/android/avd-list.log
          "$ANDROID_HOME/emulator/emulator" -list-avds | grep '^hexa-ci$'
          nohup "$ANDROID_HOME/emulator/emulator" \
            -avd hexa-ci \
            -no-window \
            -gpu swiftshader_indirect \
            -no-snapshot \
            -noaudio \
            -no-boot-anim \
            -camera-back none \
            -accel on \
            > build/android/emulator.log 2>&1 &
          echo $! > build/android/emulator.pid
          timeout 180 adb wait-for-device
          booted=0
          for attempt in $(seq 1 180); do
            completed="$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')"
            if [ "$completed" = "1" ]; then
              booted=1
              break
            fi
            sleep 2
          done
          if [ "$booted" -ne 1 ]; then
            tail -n 200 build/android/emulator.log
            exit 1
          fi
          adb shell input keyevent 82 || true
          adb shell settings put global window_animation_scale 0
          adb shell settings put global transition_animation_scale 0
          adb shell settings put global animator_duration_scale 0
          adb devices -l
      - name: Install, update and launch APK
        run: |
          set -euxo pipefail
          APK="$GITHUB_WORKSPACE/build/android/HexaOctarinaConquer-v0.11.1-ci-x86_64.apk"
          adb uninstall com.tehkne.hexaoctarina >/dev/null 2>&1 || true
          adb install "$APK" | tee build/android/adb-install.log
          grep -q 'Success' build/android/adb-install.log
          adb shell pm path com.tehkne.hexaoctarina | tee build/android/package-path.log
          grep -q '^package:' build/android/package-path.log
          adb install -r "$APK" | tee build/android/adb-update.log
          grep -q 'Success' build/android/adb-update.log
          ACTIVITY="$(adb shell cmd package resolve-activity --brief \
            -a android.intent.action.MAIN \
            -c android.intent.category.LAUNCHER \
            com.tehkne.hexaoctarina | tr -d '\r' | tail -n 1)"
          test -n "$ACTIVITY"
          echo "$ACTIVITY" | tee build/android/activity-resolve.log
          echo "$ACTIVITY" | grep 'com.tehkne.hexaoctarina'
          adb shell am start -W -n "$ACTIVITY" | tee build/android/activity-start.log
          grep -Eq 'Status: ok|Warning: Activity not started, its current task has been brought to the front' build/android/activity-start.log
          adb shell dumpsys package com.tehkne.hexaoctarina | tee build/android/package-dump.log
          grep -q 'versionCode=12' build/android/package-dump.log
          grep -q 'versionName=0.11.1' build/android/package-dump.log
          adb uninstall com.tehkne.hexaoctarina | tee build/android/adb-uninstall.log
          grep -q 'Success' build/android/adb-uninstall.log
      - name: Stop emulator
        if: always()
        run: |
          adb emu kill || true
          if [ -f build/android/emulator.pid ]; then
            kill "$(cat build/android/emulator.pid)" || true
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-emulator-diagnostic
          path: build/android/*.log
          if-no-files-found: warn

  node-authoritative-server:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-bookworm
        env:
          POSTGRES_DB: hexa_octarina_test
          POSTGRES_USER: hexa
          POSTGRES_PASSWORD: hexa-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hexa -d hexa_octarina_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://hexa:hexa-test@127.0.0.1:5432/hexa_octarina_test
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: npm install
      - name: Validate JavaScript syntax
        run: npm run syntax
      - name: Test protocol, identity, governance, resilience and observability
        run: >-
          node --test
          test/protocol.test.js test/room-manager.test.js test/private-state.test.js
          test/identity.test.js test/competition.test.js test/cluster-bus.test.js
          test/presence.test.js test/governance.test.js test/recovery-provider.test.js
          test/resilience.test.js test/admin.test.js test/observability.test.js
      - name: Test duel flow and connected provinces
        run: node --test test/duel-flow.test.js test/provinces.test.js
      - name: Test SQLite and PostgreSQL persistence
        run: >-
          node --test --test-concurrency=1
          test/persistence.test.js test/sqlite-store.test.js test/postgres-identity.test.js
          test/postgres-room-store.test.js test/postgres-competition.test.js
          test/postgres-cluster.test.js test/postgres-resilience.test.js
      - name: Test base WebSocket transport
        run: node --test test/websocket.test.js
      - name: Test authenticated WebSocket transport
        run: node --test test/account-websocket.test.js
      - name: Test competitive WebSocket transport
        run: node --test test/competitive-websocket.test.js
      - name: Test spectator replay and reconnect grace
        run: node --test --test-force-exit test/spectator-replay.test.js
      - name: Test cross-replica WebSocket transport
        run: node --test --test-force-exit test/cluster-websocket.test.js
      - name: Boot two fully distributed replicas
        env:
          HEXA_STORE: postgres
          HEXA_IDENTITY_STORE: postgres
          HEXA_COMPETITION_STORE: postgres
          HEXA_CLUSTER_BUS: postgres
          HEXA_PRESENCE_STORE: postgres
          HEXA_GOVERNANCE_STORE: postgres
          HEXA_RESILIENCE_STORE: postgres
          HEXA_RECOVERY_PROVIDER: none
          HEXA_ADMIN_TOKEN: ci-admin-token
          HEXA_RECONNECT_GRACE_MS: 2000
          HEXA_RESILIENCE_MAINTENANCE_MS: 1000
        run: |
          PORT=8090 HEXA_INSTANCE_ID=ci-replica-a node src/index.js > /tmp/hexa-a.log 2>&1 &
          first_pid=$!
          PORT=8091 HEXA_INSTANCE_ID=ci-replica-b node src/index.js > /tmp/hexa-b.log 2>&1 &
          second_pid=$!
          trap 'kill $first_pid $second_pid || true' EXIT
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8090/health > /tmp/health-a.json && \
               curl -fsS http://127.0.0.1:8091/health > /tmp/health-b.json; then
              if node - <<'NODE'
          const fs = require('fs');
          const health = [
            JSON.parse(fs.readFileSync('/tmp/health-a.json')),
            JSON.parse(fs.readFileSync('/tmp/health-b.json')),
          ];
          if (health.every((item) => item.activeInstances >= 2)) process.exit(0);
          process.exit(1);
          NODE
              then break; fi
            fi
            sleep 1
          done
          node - <<'NODE'
          const fs = require('fs');
          const health = [
            JSON.parse(fs.readFileSync('/tmp/health-a.json')),
            JSON.parse(fs.readFileSync('/tmp/health-b.json')),
          ];
          for (const item of health) {
            for (const field of ['roomStore', 'identityStore', 'competitionStore', 'clusterBus', 'presenceStore', 'governanceStore', 'resilienceStore']) {
              if (item[field] !== 'postgres') throw new Error(`${field} is not postgres`);
            }
            if (item.activeInstances < 2) throw new Error('distributed presence did not detect both replicas');
          }
          NODE
          curl -fsS -H 'Authorization: Bearer ci-admin-token' http://127.0.0.1:8090/admin/overview > /tmp/admin-overview.json
          node -e "const x=require('/tmp/admin-overview.json'); if(!Array.isArray(x.replays)||!Array.isArray(x.disconnects)) process.exit(1)"
      - name: Compare Node and Python engines
        env:
          PYTHON: python
        run: npm run test:conformance
      - name: Build production container
        working-directory: .
        run: docker build -t hexa-octarina-conquer:test .
      - name: Validate production compose stack
        working-directory: .
        run: docker compose config --quiet
