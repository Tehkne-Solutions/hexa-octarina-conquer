name: Core Tests

on:
  push:
    branches: [main, "agent/**", "hotfix/**"]
  pull_request:
    branches: [main]

concurrency:
  group: core-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-reference-engine:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e .
      - name: Compile sources
        run: python -m compileall -q src tests conformance
      - name: Run unit and Godot package tests
        run: |
          mkdir -p build/test-logs
          set +e
          python -m unittest discover -s tests -v 2>&1 | tee "build/test-logs/python-${{ matrix.python-version }}.log"
          status=${PIPESTATUS[0]}
          set -e
          exit "$status"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-test-log-${{ matrix.python-version }}
          path: build/test-logs/python-${{ matrix.python-version }}.log
          if-no-files-found: error

  godot-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install Android SDK 35 packages
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          test -x "$SDKMANAGER"
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" --sdk_root="$ANDROID_HOME" \
            "platform-tools" \
            "emulator" \
            "build-tools;35.0.1" \
            "platforms;android-35"
      - name: Download official Godot 4.6.3 and export templates
        run: |
          curl -fsSL -o godot.zip https://github.com/godotengine/godot-builds/releases/download/4.6.3-stable/Godot_v4.6.3-stable_linux.x86_64.zip
          unzip -q godot.zip
          chmod +x Godot_v4.6.3-stable_linux.x86_64
          curl -fsSL -o templates.tpz https://github.com/godotengine/godot-builds/releases/download/4.6.3-stable/Godot_v4.6.3-stable_export_templates.tpz
          rm -rf template-unpack
          mkdir -p template-unpack "$HOME/.local/share/godot/export_templates/4.6.3.stable"
          unzip -q templates.tpz -d template-unpack
          cp -R template-unpack/templates/. "$HOME/.local/share/godot/export_templates/4.6.3.stable/"
      - name: Install Godot Android Gradle template
        run: bash scripts/install-godot-android-template.sh client/godot
      - name: Restore stable development signing cache
        uses: actions/cache@v4
        with:
          path: ~/.android/tehkne-dev.keystore
          key: tehkne-android-dev-keystore-v1
      - name: Configure stable Tehkné development signing
        run: |
          mkdir -p "$HOME/.config/godot" "$HOME/.android"
          if [ ! -f "$HOME/.android/tehkne-dev.keystore" ]; then
            keytool -genkeypair -v \
              -keystore "$HOME/.android/tehkne-dev.keystore" \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Tehkne Solutions Android Development,O=Tehkne Solutions,C=BR"
          fi
          keytool -list -keystore "$HOME/.android/tehkne-dev.keystore" -storepass android -alias androiddebugkey >/dev/null
          printf '%s\n' \
            '[gd_resource type="EditorSettings" format=3]' \
            '[resource]' \
            "export/android/android_sdk_path = \"$ANDROID_HOME\"" \
            "export/android/java_sdk_path = \"$JAVA_HOME\"" \
            "export/android/debug_keystore = \"$HOME/.android/tehkne-dev.keystore\"" \
            'export/android/debug_keystore_user = "androiddebugkey"' \
            'export/android/debug_keystore_pass = "android"' \
            > "$HOME/.config/godot/editor_settings-4.6.tres"
          python -m pip install --disable-pip-version-check androguard
      - name: Import and parse Godot project
        run: ./Godot_v4.6.3-stable_linux.x86_64 --headless --path client/godot --editor --quit-after 2
      - name: Export physical-device APKs
        env:
          GODOT_ANDROID_KEYSTORE_DEBUG_PATH: ${{ runner.home }}/.android/tehkne-dev.keystore
          GODOT_ANDROID_KEYSTORE_DEBUG_USER: androiddebugkey
          GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD: android
        run: |
          mkdir -p build/android
          export_apk() {
            preset="$1"
            output="$2"
            log="$3"
            set +e
            ./Godot_v4.6.3-stable_linux.x86_64 --verbose --headless \
              --path client/godot \
              --export-debug "$preset" \
              "$PWD/$output" \
              2>&1 | tee "$log"
            status=${PIPESTATUS[0]}
            set -e
            if [ "$status" -ne 0 ]; then
              echo "::error title=Godot Android export failed ($preset)::$(tail -n 30 "$log" | tr '\n' ' ')"
              exit "$status"
            fi
            test -s "$output"
          }
          export_apk "Android" "build/android/HexaOctarinaConquer-v0.11.2-arm64.apk" "build/android/godot-export-arm64.log"
          export_apk "Android ARMv7" "build/android/HexaOctarinaConquer-v0.11.2-armv7.apk" "build/android/godot-export-armv7.log"
          export_apk "Android x86_64 CI" "build/android/HexaOctarinaConquer-v0.11.2-x86_64-ci.apk" "build/android/godot-export-x86_64.log"
      - name: Validate APKs, signatures and physical size
        run: |
          PACKAGE=com.tehkne.hexaoctarina.mobile
          VERSION_NAME=0.11.2
          VERSION_CODE=13
          for APK in build/android/*.apk; do
            "$ANDROID_HOME/build-tools/35.0.1/apksigner" verify --verbose --print-certs "$APK"
          done
          python scripts/validate-android-apk.py \
            build/android/HexaOctarinaConquer-v0.11.2-arm64.apk \
            --package "$PACKAGE" --version-name "$VERSION_NAME" --version-code "$VERSION_CODE" \
            --required-abi arm64-v8a --max-size-mb 110 \
            | tee build/android/apk-validation-arm64.json
          python scripts/validate-android-apk.py \
            build/android/HexaOctarinaConquer-v0.11.2-armv7.apk \
            --package "$PACKAGE" --version-name "$VERSION_NAME" --version-code "$VERSION_CODE" \
            --required-abi armeabi-v7a --max-size-mb 110 \
            | tee build/android/apk-validation-armv7.json
          python scripts/validate-android-apk.py \
            build/android/HexaOctarinaConquer-v0.11.2-x86_64-ci.apk \
            --package "$PACKAGE" --version-name "$VERSION_NAME" --version-code "$VERSION_CODE" \
            --required-abi x86_64 --max-size-mb 110 \
            | tee build/android/apk-validation-x86_64.json
          certs=$(for APK in build/android/*.apk; do
            "$ANDROID_HOME/build-tools/35.0.1/apksigner" verify --print-certs "$APK" \
              | sed -n 's/^Signer #1 certificate SHA-256 digest: //p'
          done | sort -u)
          test "$(printf '%s\n' "$certs" | sed '/^$/d' | wc -l)" -eq 1
      - name: Install and launch on Android 8
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 26
          arch: x86_64
          profile: pixel_2
          disable-animations: true
          script: |
            adb install --no-streaming build/android/HexaOctarinaConquer-v0.11.2-x86_64-ci.apk
            adb shell pm path com.tehkne.hexaoctarina.mobile
            adb shell dumpsys package com.tehkne.hexaoctarina.mobile | grep -E 'versionCode=13|versionName=0.11.2'
            adb shell monkey -p com.tehkne.hexaoctarina.mobile -c android.intent.category.LAUNCHER 1
            sleep 5
            adb shell pidof com.tehkne.hexaoctarina.mobile
      - name: Install and launch on Android 14
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_2
          disable-animations: true
          script: |
            adb install --no-streaming build/android/HexaOctarinaConquer-v0.11.2-x86_64-ci.apk
            adb shell pm path com.tehkne.hexaoctarina.mobile
            adb shell dumpsys package com.tehkne.hexaoctarina.mobile | grep -E 'versionCode=13|versionName=0.11.2'
            adb shell monkey -p com.tehkne.hexaoctarina.mobile -c android.intent.category.LAUNCHER 1
            sleep 5
            adb shell pidof com.tehkne.hexaoctarina.mobile
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hexa-octarina-android-physical-0.11.2
          path: |
            build/android/HexaOctarinaConquer-v0.11.2-arm64.apk
            build/android/HexaOctarinaConquer-v0.11.2-armv7.apk
            build/android/godot-export-arm64.log
            build/android/godot-export-armv7.log
            build/android/apk-validation-arm64.json
            build/android/apk-validation-armv7.json
            scripts/INSTALAR-ANDROID-WINDOWS.cmd
          if-no-files-found: error

  node-authoritative-server:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-bookworm
        env:
          POSTGRES_DB: hexa_octarina_test
          POSTGRES_USER: hexa
          POSTGRES_PASSWORD: hexa-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hexa -d hexa_octarina_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://hexa:hexa-test@127.0.0.1:5432/hexa_octarina_test
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: npm install
      - name: Validate JavaScript syntax
        run: npm run syntax
      - name: Test protocol, identity, governance, resilience and observability
        run: >-
          node --test
          test/protocol.test.js test/room-manager.test.js test/private-state.test.js
          test/identity.test.js test/competition.test.js test/cluster-bus.test.js
          test/presence.test.js test/governance.test.js test/recovery-provider.test.js
          test/resilience.test.js test/admin.test.js test/observability.test.js
      - name: Test duel flow and connected provinces
        run: node --test test/duel-flow.test.js test/provinces.test.js
      - name: Test SQLite and PostgreSQL persistence
        run: >-
          node --test --test-concurrency=1
          test/persistence.test.js test/sqlite-store.test.js test/postgres-identity.test.js
          test/postgres-room-store.test.js test/postgres-competition.test.js
          test/postgres-cluster.test.js test/postgres-resilience.test.js
      - name: Test base WebSocket transport
        run: node --test test/websocket.test.js
      - name: Test authenticated WebSocket transport
        run: node --test test/account-websocket.test.js
      - name: Test competitive WebSocket transport
        run: node --test test/competitive-websocket.test.js
      - name: Test spectator replay and reconnect grace
        run: node --test --test-force-exit test/spectator-replay.test.js
      - name: Test cross-replica WebSocket transport
        run: node --test --test-force-exit test/cluster-websocket.test.js
      - name: Boot two fully distributed replicas
        env:
          HEXA_STORE: postgres
          HEXA_IDENTITY_STORE: postgres
          HEXA_COMPETITION_STORE: postgres
          HEXA_CLUSTER_BUS: postgres
          HEXA_PRESENCE_STORE: postgres
          HEXA_GOVERNANCE_STORE: postgres
          HEXA_RESILIENCE_STORE: postgres
          HEXA_RECOVERY_PROVIDER: none
          HEXA_ADMIN_TOKEN: ci-admin-token
          HEXA_RECONNECT_GRACE_MS: 2000
          HEXA_RESILIENCE_MAINTENANCE_MS: 1000
        run: |
          PORT=8090 HEXA_INSTANCE_ID=ci-replica-a node src/index.js > /tmp/hexa-a.log 2>&1 &
          first_pid=$!
          PORT=8091 HEXA_INSTANCE_ID=ci-replica-b node src/index.js > /tmp/hexa-b.log 2>&1 &
          second_pid=$!
          trap 'kill $first_pid $second_pid || true' EXIT
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8090/health > /tmp/health-a.json && \
               curl -fsS http://127.0.0.1:8091/health > /tmp/health-b.json; then
              if node - <<'NODE'
          const fs = require('fs');
          const health = [
            JSON.parse(fs.readFileSync('/tmp/health-a.json')),
            JSON.parse(fs.readFileSync('/tmp/health-b.json')),
          ];
          if (health.every((item) => item.activeInstances >= 2)) process.exit(0);
          process.exit(1);
          NODE
              then break; fi
            fi
            sleep 1
          done
          node - <<'NODE'
          const fs = require('fs');
          const health = [
            JSON.parse(fs.readFileSync('/tmp/health-a.json')),
            JSON.parse(fs.readFileSync('/tmp/health-b.json')),
          ];
          for (const item of health) {
            for (const field of ['roomStore', 'identityStore', 'competitionStore', 'clusterBus', 'presenceStore', 'governanceStore', 'resilienceStore']) {
              if (item[field] !== 'postgres') throw new Error(`${field} is not postgres`);
            }
            if (item.activeInstances < 2) throw new Error('distributed presence did not detect both replicas');
          }
          NODE
          curl -fsS -H 'Authorization: Bearer ci-admin-token' http://127.0.0.1:8090/admin/overview > /tmp/admin-overview.json
          node -e "const x=require('/tmp/admin-overview.json'); if(!Array.isArray(x.replays)||!Array.isArray(x.disconnects)) process.exit(1)"
      - name: Compare Node and Python engines
        env:
          PYTHON: python
        run: npm run test:conformance
      - name: Build production container
        working-directory: .
        run: docker build -t hexa-octarina-conquer:test .
      - name: Validate production compose stack
        working-directory: .
        run: docker compose config --quiet
