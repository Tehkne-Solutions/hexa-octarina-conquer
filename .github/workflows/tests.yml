name: Core Tests

on:
  push:
    branches: [main, "agent/**"]
  pull_request:
    branches: [main]

concurrency:
  group: core-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-reference-engine:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e .
      - name: Compile sources
        run: python -m compileall -q src tests conformance
      - name: Run unit and Godot package tests
        run: python -m unittest discover -s tests -v

  godot-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Install Android SDK 35 packages
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          test -x "$SDKMANAGER"
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" --sdk_root="$ANDROID_HOME" \
            "platform-tools" \
            "build-tools;35.0.1" \
            "platforms;android-35"
      - name: Download official Godot 4.6.3 and export templates
        run: |
          curl -fsSL -o godot.zip https://github.com/godotengine/godot-builds/releases/download/4.6.3-stable/Godot_v4.6.3-stable_linux.x86_64.zip
          unzip -q godot.zip
          chmod +x Godot_v4.6.3-stable_linux.x86_64
          curl -fsSL -o templates.tpz https://github.com/godotengine/godot-builds/releases/download/4.6.3-stable/Godot_v4.6.3-stable_export_templates.tpz
          rm -rf template-unpack
          mkdir -p template-unpack "$HOME/.local/share/godot/export_templates/4.6.3.stable"
          unzip -q templates.tpz -d template-unpack
          cp -R template-unpack/templates/. "$HOME/.local/share/godot/export_templates/4.6.3.stable/"
      - name: Configure Android export tools
        run: |
          mkdir -p "$HOME/.config/godot" "$HOME/.android"
          printf '%s\n' \
            '[gd_resource type="EditorSettings" format=3]' \
            '[resource]' \
            "export/android/android_sdk_path = \"$ANDROID_HOME\"" \
            "export/android/java_sdk_path = \"$JAVA_HOME\"" \
            "export/android/debug_keystore = \"$HOME/.android/debug.keystore\"" \
            'export/android/debug_keystore_user = "androiddebugkey"' \
            'export/android/debug_keystore_pass = "android"' \
            > "$HOME/.config/godot/editor_settings-4.6.tres"
          if [ ! -f "$HOME/.android/debug.keystore" ]; then
            keytool -genkeypair -v \
              -keystore "$HOME/.android/debug.keystore" \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Tehkné Solutions,C=BR"
          fi
      - name: Import and parse Godot project
        run: ./Godot_v4.6.3-stable_linux.x86_64 --headless --path client/godot --editor --quit-after 2
      - name: Export Android debug APK
        env:
          GODOT_ANDROID_KEYSTORE_DEBUG_PATH: ${{ github.workspace }}/.ci/debug.keystore
          GODOT_ANDROID_KEYSTORE_DEBUG_USER: androiddebugkey
          GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD: android
        run: |
          mkdir -p build/android .ci
          cp "$HOME/.android/debug.keystore" .ci/debug.keystore
          set +e
          ./Godot_v4.6.3-stable_linux.x86_64 --verbose --headless \
            --path client/godot \
            --export-debug Android \
            "$PWD/build/android/HexaOctarinaConquer-debug.apk" \
            2>&1 | tee build/android/godot-export.log
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            echo "::error title=Godot Android export failed::$(tail -n 20 build/android/godot-export.log | tr '\n' ' ')"
            exit "$status"
          fi
          test -s build/android/HexaOctarinaConquer-debug.apk
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hexa-octarina-android-debug
          path: |
            build/android/HexaOctarinaConquer-debug.apk
            build/android/godot-export.log
          if-no-files-found: error

  node-authoritative-server:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-bookworm
        env:
          POSTGRES_DB: hexa_octarina_test
          POSTGRES_USER: hexa
          POSTGRES_PASSWORD: hexa-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hexa -d hexa_octarina_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://hexa:hexa-test@127.0.0.1:5432/hexa_octarina_test
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: npm install
      - name: Validate JavaScript syntax
        run: npm run syntax
      - name: Test protocol, identity, governance and observability
        run: >-
          node --test
          test/protocol.test.js test/room-manager.test.js test/private-state.test.js
          test/identity.test.js test/competition.test.js test/cluster-bus.test.js
          test/presence.test.js test/governance.test.js test/recovery-provider.test.js
          test/admin.test.js test/observability.test.js
      - name: Test duel flow and connected provinces
        run: node --test test/duel-flow.test.js test/provinces.test.js
      - name: Test SQLite and PostgreSQL persistence
        run: >-
          node --test --test-concurrency=1
          test/persistence.test.js test/sqlite-store.test.js test/postgres-identity.test.js
          test/postgres-room-store.test.js test/postgres-competition.test.js test/postgres-cluster.test.js
      - name: Test base WebSocket transport
        run: node --test test/websocket.test.js
      - name: Test authenticated WebSocket transport
        run: node --test test/account-websocket.test.js
      - name: Test competitive WebSocket transport
        run: node --test test/competitive-websocket.test.js
      - name: Test cross-replica WebSocket transport
        run: node --test --test-force-exit test/cluster-websocket.test.js
      - name: Boot two fully distributed replicas
        env:
          HEXA_STORE: postgres
          HEXA_IDENTITY_STORE: postgres
          HEXA_COMPETITION_STORE: postgres
          HEXA_CLUSTER_BUS: postgres
          HEXA_PRESENCE_STORE: postgres
          HEXA_GOVERNANCE_STORE: postgres
          HEXA_RECOVERY_PROVIDER: none
          HEXA_ADMIN_TOKEN: ci-admin-token
        run: |
          PORT=8090 HEXA_INSTANCE_ID=ci-replica-a node src/index.js > /tmp/hexa-a.log 2>&1 &
          first_pid=$!
          PORT=8091 HEXA_INSTANCE_ID=ci-replica-b node src/index.js > /tmp/hexa-b.log 2>&1 &
          second_pid=$!
          trap 'kill $first_pid $second_pid || true' EXIT
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8090/health > /tmp/health-a.json && \
               curl -fsS http://127.0.0.1:8091/health > /tmp/health-b.json; then
              if node - <<'NODE'
          const fs = require('fs');
          const health = [
            JSON.parse(fs.readFileSync('/tmp/health-a.json')),
            JSON.parse(fs.readFileSync('/tmp/health-b.json')),
          ];
          if (health.every((item) => item.activeInstances >= 2)) process.exit(0);
          process.exit(1);
          NODE
              then break; fi
            fi
            sleep 1
          done
          node - <<'NODE'
          const fs = require('fs');
          const health = [
            JSON.parse(fs.readFileSync('/tmp/health-a.json')),
            JSON.parse(fs.readFileSync('/tmp/health-b.json')),
          ];
          for (const item of health) {
            for (const field of ['roomStore', 'identityStore', 'competitionStore', 'clusterBus', 'presenceStore', 'governanceStore']) {
              if (item[field] !== 'postgres') throw new Error(`${field} is not postgres`);
            }
            if (item.activeInstances < 2) throw new Error('distributed presence did not detect both replicas');
          }
          NODE
      - name: Compare Node and Python engines
        env:
          PYTHON: python
        run: npm run test:conformance
      - name: Build production container
        working-directory: .
        run: docker build -t hexa-octarina-conquer:test .
      - name: Validate production compose stack
        working-directory: .
        run: docker compose config --quiet
