name: Cluster Transport Debug

on:
  push:
    branches: ["agent/sprint-10-barramento-presenca-admin"]
  pull_request:
    branches: [main]

concurrency:
  group: cluster-debug-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cluster-websocket:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install dependencies
        run: npm install
      - name: Run isolated cross-replica transport test
        run: |
          set +e
          node --test --test-force-exit test/cluster-websocket.test.js 2>&1 | tee /tmp/cluster-test.log
          status=${PIPESTATUS[0]}
          set -e
          exit "$status"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cluster-transport-log
          path: /tmp/cluster-test.log
          if-no-files-found: error
