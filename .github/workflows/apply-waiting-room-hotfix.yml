name: Apply Waiting Room Hotfix

on:
  push:
    branches: ["hotfix/waiting-room-campaign-entry"]
    paths:
      - ".github/workflows/apply-waiting-room-hotfix.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: hotfix/waiting-room-campaign-entry
          fetch-depth: 0
      - name: Finish responsive waiting-room UX
        run: |
          python - <<'PY'
          from pathlib import Path

          app_path = Path("client/web/src/App.tsx")
          app = app_path.read_text(encoding="utf-8")
          old_class = '        <aside className={`battle-log glass ${campaign ? "campaign-objectives" : ""}`}>\n'
          new_class = '        <aside className={`battle-log glass ${campaign ? "campaign-objectives" : waitingForRival ? "waiting-room-panel" : ""}`}>\n'
          if old_class not in app:
              raise SystemExit("waiting-room battle-log class source fragment was not found")
          app_path.write_text(app.replace(old_class, new_class, 1), encoding="utf-8")

          css_path = Path("client/web/src/styles.css")
          css = css_path.read_text(encoding="utf-8")
          marker = '.battle-log p { flex: 1; color: #aab4d1; font-size: 0.85rem; }\n'
          addition = (
              marker
              + '.compact-campaign-button { min-height: 66px; margin: 4px 0; padding: 10px; }\n'
              + '.compact-campaign-button > span { width: 40px; height: 40px; flex-basis: 40px; font-size: 1.45rem; }\n'
              + '.compact-campaign-button strong { font-size: 0.82rem; }\n'
              + '.compact-campaign-button small { font-size: 0.67rem; }\n'
              + '.waiting-room-panel .ghost-button { width: 100%; border-radius: 12px; background: #111936; }\n'
          )
          if marker not in css:
              raise SystemExit("battle-log CSS marker was not found")
          css = css.replace(marker, addition, 1)
          css = css.replace(
              '  .battle-log:not(.campaign-objectives) { pointer-events: none; }\n'
              '  .battle-log:not(.campaign-objectives) strong, .battle-log:not(.campaign-objectives) button { display: none; }\n',
              '  .battle-log:not(.campaign-objectives):not(.waiting-room-panel) { pointer-events: none; }\n'
              '  .battle-log:not(.campaign-objectives):not(.waiting-room-panel) strong, .battle-log:not(.campaign-objectives):not(.waiting-room-panel) button { display: none; }\n'
              '  .waiting-room-panel { width: min(290px, 72%); pointer-events: auto; }\n'
              '  .waiting-room-panel p { flex: 0; }\n',
              1,
          )
          css_path.write_text(css, encoding="utf-8")
          PY
      - name: Commit responsive client fix
        run: |
          git config user.name "Tehkné Solutions Bot"
          git config user.email "tehkne-solutions@users.noreply.github.com"
          git add client/web/src/App.tsx client/web/src/styles.css
          git commit -m "fix: expose campaign recovery actions on mobile"
          git push origin HEAD:hotfix/waiting-room-campaign-entry
