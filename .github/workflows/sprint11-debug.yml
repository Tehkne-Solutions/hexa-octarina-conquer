name: Sprint 11 Debug

on:
  push:
    branches: ["agent/sprint-11-reconnect-spectator-replay"]
  pull_request:
    branches: [main]

concurrency:
  group: sprint11-debug-${{ github.ref }}
  cancel-in-progress: true

jobs:
  isolated-node-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test-file:
          - protocol.test.js
          - room-manager.test.js
          - private-state.test.js
          - identity.test.js
          - competition.test.js
          - cluster-bus.test.js
          - presence.test.js
          - governance.test.js
          - recovery-provider.test.js
          - resilience.test.js
          - admin.test.js
          - observability.test.js
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm install
      - name: Run ${{ matrix.test-file }}
        run: node --test test/${{ matrix.test-file }}
