services:
  - type: web
    name: hexa-octarina-conquer
    runtime: docker
    plan: free
    region: virginia
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HEXA_STORE
        value: postgres
      - key: HEXA_IDENTITY_STORE
        value: postgres
      - key: HEXA_COMPETITION_STORE
        value: postgres
      - key: HEXA_CAMPAIGN_STORE
        value: postgres
      - key: HEXA_CLUSTER_BUS
        value: postgres
      - key: HEXA_PRESENCE_STORE
        value: postgres
      - key: HEXA_GOVERNANCE_STORE
        value: postgres
      - key: HEXA_RESILIENCE_STORE
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: hexa-octarina-postgres
          property: connectionString
      - key: HEXA_PG_POOL_SIZE
        value: "4"
      - key: HEXA_ROOM_PG_POOL_SIZE
        value: "4"
      - key: HEXA_COMPETITION_PG_POOL_SIZE
        value: "4"
      - key: HEXA_CAMPAIGN_PG_POOL_SIZE
        value: "3"
      - key: HEXA_CLUSTER_PG_POOL_SIZE
        value: "2"
      - key: HEXA_PRESENCE_PG_POOL_SIZE
        value: "2"
      - key: HEXA_GOVERNANCE_PG_POOL_SIZE
        value: "2"
      - key: HEXA_RESILIENCE_PG_POOL_SIZE
        value: "3"
      - key: HEXA_PRESENCE_TTL_MS
        value: "45000"
      - key: HEXA_RECONNECT_GRACE_MS
        value: "60000"
      - key: HEXA_RESILIENCE_MAINTENANCE_MS
        value: "5000"
      - key: HEXA_ABANDONMENT_COOLDOWN_MS
        value: "600000"
      - key: HEXA_ADMIN_TOKEN
        generateValue: true
      - key: HEXA_RECOVERY_PROVIDER
        value: none
      - key: HEXA_RECOVERY_EXPOSE_CODE
        value: "false"

databases:
  - name: hexa-octarina-postgres
    plan: free
    region: virginia
    databaseName: hexa_octarina
    user: hexa
    postgresMajorVersion: "16"
    ipAllowList: []
